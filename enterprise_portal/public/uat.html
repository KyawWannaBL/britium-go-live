<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Britium Enterprise UAT</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #061524;
      color: #eef8ff;
    }
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      z-index: 0;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 8, 23, 0.72);
      z-index: 1;
    }
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(440px, 100%);
      background: #fff;
      color: #111827;
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,.45);
    }
    .logo-wrap {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      border-radius: 18px;
      background: #fff;
    }
    h1 {
      margin: 12px 0 4px;
      font-size: 24px;
      font-weight: 900;
    }
    .subtitle {
      color: #f59e0b;
      font-weight: 900;
      font-size: 12px;
      letter-spacing: 2px;
    }
    h2 {
      margin: 0 0 18px;
      color: #111827;
      font-size: 28px;
      font-weight: 900;
    }
    label {
      display: block;
      font-weight: 900;
      color: #6b7280;
      font-size: 12px;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 15px;
      margin-bottom: 16px;
      color: #111827;
      background: #fff;
    }
    button {
      width: 100%;
      padding: 16px 0;
      border-radius: 14px;
      border: 0;
      background: #f59e0b;
      color: #111827;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .error {
      display: none;
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 14px;
      font-weight: 800;
    }
    .note {
      margin-top: 16px;
      background: #f8fafc;
      color: #475569;
      padding: 12px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
      line-height: 1.5;
    }
    .dashboard {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 24px;
    }
    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .dash-title {
      margin: 6px 0;
      font-size: 34px;
      color: #eef8ff;
    }
    .dash-subtitle {
      color: #a8c4da;
      margin: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .module {
      text-decoration: none;
      border: 1px solid rgba(56,189,248,.28);
      background: rgba(8,20,36,.86);
      color: #eef8ff;
      border-radius: 18px;
      padding: 18px;
      min-height: 90px;
      box-shadow: 0 18px 55px rgba(0,0,0,.22);
      display: block;
    }
    .module-title {
      color: #fbbf24;
      font-weight: 900;
      font-size: 16px;
    }
    .module-path {
      color: #93c5fd;
      margin-top: 8px;
      font-size: 13px;
    }
    .logout {
      width: auto;
      padding: 12px 16px;
      background: #f97316;
      color: #fff;
    }
    .banner {
      margin-top: 24px;
      padding: 18px;
      border: 1px solid rgba(251,191,36,.35);
      background: rgba(251,191,36,.08);
      border-radius: 18px;
      color: #fbbf24;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <video class="bg-video" src="/BACKGROUND.mp4" autoplay muted loop playsinline></video>
  <div class="overlay"></div>
  <main id="app" class="page"></main>

  <script>
    const EMAIL = "sai@britiumexpress.com";
    const PASSWORD = "Sh@nstar28";

    function hasSession() {
      return localStorage.getItem("be_user_authenticated") === "true";
    }

    function setSession(email) {
      const access = {
        ok: true,
        email,
        role: "superadmin",
        portal: "enterprise",
        branch_code: "HQ",
        permissions: { all: true },
        source: "standalone_static_uat"
      };

      localStorage.setItem("be_user_authenticated", "true");
      localStorage.setItem("be_session_ok", "true");
      localStorage.setItem("be_login_email", email);
      localStorage.setItem("be_user_email", email);
      localStorage.setItem("be_user_role", "superadmin");
      localStorage.setItem("be_user_portal", "enterprise");
      localStorage.setItem("be_branch_code", "HQ");
      localStorage.setItem("be_user_access_profile", JSON.stringify(access));
    }

    function clearSession() {
      localStorage.clear();
      sessionStorage.clear();
      renderLogin();
    }

    function renderLogin() {
      document.getElementById("app").className = "page";
      document.getElementById("app").innerHTML = `
        <form class="card" id="loginForm">
          <div class="logo-wrap">
            <img class="logo" src="/logo.png" alt="Britium Express" />
            <h1>BRITIUM EXPRESS</h1>
            <div class="subtitle">ENTERPRISE PORTAL</div>
          </div>

          <h2>Sign In</h2>

          <div id="error" class="error"></div>

          <label>EMAIL ADDRESS</label>
          <input id="email" type="email" autocomplete="username" value="${EMAIL}" />

          <label>PASSWORD</label>
          <input id="password" type="password" autocomplete="current-password" />

          <button type="submit">Sign In to Portal</button>

          <div class="note">
            Standalone Enterprise UAT login. This page bypasses the React login loop so you can continue testing.
          </div>
        </form>
      `;

      document.getElementById("loginForm").addEventListener("submit", function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value.trim().toLowerCase();
        const password = document.getElementById("password").value.trim();
        const error = document.getElementById("error");

        if (email !== EMAIL) {
          error.style.display = "block";
          error.textContent = "Use sai@britiumexpress.com for UAT.";
          return;
        }

        if (password !== PASSWORD) {
          error.style.display = "block";
          error.textContent = "Wrong UAT password.";
          return;
        }

        setSession(email);
        renderDashboard();
      });
    }

    function renderDashboard() {
      document.getElementById("app").className = "dashboard";

      const modules = [
        ["Dashboard", "#dashboard"],
        ["Create Delivery", "#create-delivery"],
        ["CS Portal", "#cs"],
        ["Way Management", "#way-management"],
        ["Supervisor Hub", "#supervisor"],
        ["Pickup Assignment", "#pickup-assignment"],
        ["Data Entry", "#data-entry"],
        ["Warehouse Ops", "#warehouse"],
        ["Dispatch Center", "#dispatch"],
        ["Branch Office", "#branch"],
        ["Finance Portal", "#finance"],
        ["COD Settlement", "#cod-settlement"],
        ["Waybill & Invoice", "#waybill-invoice"],
        ["Merchant Portal", "#merchant"],
        ["Customer Portal", "#customer"],
        ["Master Data", "#master-data"],
        ["Exceptions", "#exceptions"],
        ["Reporting", "#reporting"],
        ["Tariff", "#tariff"],
        ["Settings", "#settings"],
        ["Profile", "#profile"]
      ];

      document.getElementById("app").innerHTML = `
        <header class="dash-header">
          <div>
            <div class="subtitle">BRITIUM EXPRESS</div>
            <h1 class="dash-title">Enterprise Portal UAT</h1>
            <p class="dash-subtitle">
              Logged in as ${localStorage.getItem("be_user_email") || EMAIL} · superadmin · HQ
            </p>
          </div>
          <button class="logout" id="logout">Sign out</button>
        </header>

        <section class="grid">
          ${modules.map(([name, path]) => `
            <a class="module" href="${path}">
              <div class="module-title">${name}</div>
              <div class="module-path">${path}</div>
            </a>
          `).join("")}
        </section>

        <section class="banner">
          Standalone static UAT shell is active. You can type, login, and continue UAT from here.
        </section>
      `;

      document.getElementById("logout").addEventListener("click", clearSession);
    }

    if (hasSession()) {
      renderDashboard();
    } else {
      renderLogin();
    }
  </script>
</body>
</html>
